const calcularHoraEntrega = (tiempoValor) => {
  if (!tiempoValor) return "";

  const ahora = new Date();
  let minutos = 0;

  if (tiempoValor.includes("h")) {
    const partes = tiempoValor.split("h");
    minutos += parseInt(partes[0]) * 60;
    if (partes[1]) minutos += parseInt(partes[1]);
  } else {
    minutos = parseInt(tiempoValor);
  }

  const entrega = new Date(ahora.getTime() + minutos * 60000);

  return entrega.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
};

</div>

      <div className="flex gap-2 mb-3">

{categoriaActiva && (

        {/* REF */}

{ticket.map((t, i) => {

  // 🔥 NO mostrar hijos sueltos

  const menu = MENUS?.[t.ref];

  return (

      <div className="border-b py-2">

        <div className="flex items-start justify-between">

          {/* IZQUIERDA */}
          <div className="flex flex-col flex-1">

            <div className="text-xl font-bold leading-none">
              {t.cantidad} x {t.ref}
            </div>

            <div className="text-[10px] text-gray-500 leading-none">
              {t.nombre}
            </div>

            {menu && (
  <div className="text-[10px] font-bold pl-2 mt-1 leading-tight">
    {menu.items.map(([r]) => {
      const mod = t.mods?.[r] ?? "";

      return (
        <div
          key={r}
          onClick={() => editarSubMenu(t.ref, r)}
          className="cursor-pointer"
        >
          {r}{mod ? ` ${mod}` : ""}
        </div>

    })}
  </div>
)}

            {(t.nota || t.aceite || t.gluten || t.verdura || t.carne || t.huevo || t.marisco || t.frutossecos) && (
              <div className="text-[10px] font-bold leading-tight">
                {[
                  t.verdura && "NO VERDURA",
                  t.carne && "NO CARNE",
                  t.gluten && "SIN GLUTEN",
                  t.aceite && "ACEITE",
                  t.huevo && "NO HUEVO",
                  t.marisco && "ALERGIA MARISCO",

              <button onClick={(e) => { e.stopPropagation(); sumar(t.ref); }}>➕</button>
              <button onClick={(e) => { e.stopPropagation(); eliminarLinea(t.ref); }}>❌</button>
              <button onClick={(e) => { e.stopPropagation(); editarNota(t); }}>📝</button>
            </div>

            <div className="text-right min-w-[60px]">
              {(t.precio * t.cantidad).toFixed(2)}€
            </div>

          </div>

        </div>

      </div>

    </div>
  );

})}

    {(tipoPedido === "llevar" || tipoPedido === "recoger") && (

  </select>

</div>

    <input
      placeholder="📞 Teléfono"

        }`}
      >
        💳 Visa
      </button>

    </div>

  </div>
)}
      {/* 🔥 MODAL NOTAS */}
      {productoEditando && (

              placeholder="NOTA..."
              value={notaTemp}

              ["huevo", "NO HUEVO"],
              ["marisco", "ALERGIA MARISCO"],
              ["frutossecos", "ALERGIA FRUTOS SECOS"]
            ].map(([key, label]) => (
              <div key={key} className="flex justify-between items-center mb-1">
                <span>{label}</span>
                <input
                  type="checkbox"

            <div className="flex gap-2 mt-4">

                        }
                      : t

                  setProductoEditando(null);
                }}
                className="w-1/2 bg-green-600 text-white p-2 rounded"
              >
                GUARDAR
              </button>

              <button
                onClick={() => setProductoEditando(null)}

              >

              </button>
            </div>

          </div>
        </div>
      )}

      {subMenuEditando && (
  <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

      <div className="font-bold mb-2">
        MODIFICAR {subMenuEditando.subRef}
      </div>

      <input
        placeholder="NOTA..."
        value={notaTemp}
        onChange={e => setNotaTemp(e.target.value)}
        className="w-full border p-2 mb-3"
      />

      {[
        ["aceite", "ACEITE"],
        ["gluten", "SIN GLUTEN"],
        ["verdura", "NO VERDURA"],
        ["carne", "NO CARNE"],
        ["huevo", "NO HUEVO"],
        ["marisco", "ALERGIA MARISCO"],
        ["frutossecos", "ALERGIA FRUTOS SECOS"]
      ].map(([key, label]) => (
        <div key={key} className="flex justify-between items-center mb-1">
          <span>{label}</span>
          <input
            type="checkbox"
            checked={checksTemp[key]}
            onChange={() =>
              setChecksTemp({
                ...checksTemp,
                [key]: !checksTemp[key]
              })
            }
          />
        </div>
      ))}

      <div className="flex gap-2 mt-4">
        <button
          onClick={() => {
            const texto = [
              checksTemp.aceite && "ACEITE",
              checksTemp.gluten && "SIN GLUTEN",
              checksTemp.verdura && "NO VERDURA",
              checksTemp.carne && "NO CARNE",
              checksTemp.huevo && "NO HUEVO",
              checksTemp.marisco && "ALERGIA MARISCO",
              checksTemp.frutossecos && "ALERGIA FRUTOS SECOS",
              notaTemp
            ].filter(Boolean).join("\n");

            setTicket(ticket.map(t => {
              if (t.ref === subMenuEditando.menuRef && t.esMenuPadre) {
                return {
                  ...t,
                  mods: {
                    ...t.mods,
                    [subMenuEditando.subRef]: texto.toUpperCase()
                  }
                };
              }
              return t;
            }));

            setSubMenuEditando(null);
          }}
          className="w-1/2 bg-green-600 text-white p-2 rounded"
        >
          GUARDAR
        </button>

        <button
          onClick={() => setSubMenuEditando(null)}
          className="w-1/2 bg-gray-400 text-white p-2 rounded"
        >
          CANCELAR
        </button>

  );
}
