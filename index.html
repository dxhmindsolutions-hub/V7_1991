  if (!tiempoValor) return "";

  const ahora = new Date();
  let minutos = 0;

  if (tiempoValor.includes("h")) {
    const partes = tiempoValor.split("h");
    minutos += parseInt(partes[0]) * 60;
    if (partes[1]) minutos += parseInt(partes[1]);
  } else {
    minutos = parseInt(tiempoValor);
  }

};

    ref.includes(busquedaGestion)
  )
  .sort((a,b)=>Number(a[0]) - Number(b[0]))
  .map(([ref,a])=>(
            <div key={ref} className="p-3 border-b flex justify-between items-center">
             <div className="flex items-center gap-3">

  {/* REFERENCIA */}
  <div className="bg-black text-white px-2 py-1 rounded text-sm font-bold min-w-[45px] text-center">
    {ref}
  </div>

  {/* NOMBRE Y PRECIO */}
  <div>
    <div className="font-medium">{a.nombre}</div>
    <div className="text-xs text-gray-500">{a.precio}€</div>
  </div>

</div>
              <div className="flex gap-3 text-lg">
                <button onClick={()=>editarArticulo(ref)} className="text-blue-500">✏️</button>
                <button onClick={()=>{ if(confirm(`¿Eliminar ${a.nombre}?`)) eliminarArticulo(ref)}} className="text-red-500">❌</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

// ====================
// 🧾 APP NORMAL
// ====================
return (
  <div className="p-4 max-w-md mx-auto">

    {/* 🔴 PANTALLA TOMAR PEDIDOS */}
    {modoPedidos && (
      <>

        {/* HEADER */}
        <div className="flex justify-between items-center mb-4">

          <button
            onClick={() => setMenuAbierto(true)}
            className="text-2xl"
          >
            ☰
          </button>

          <h1 className="font-bold">Mini POS</h1>

          <div className="flex gap-2">

            <button
              onClick={() => {
                setModoPedidos(false);
                setModoAbiertos(true);
              }}
            >
              📋 Pedidos
            </button>

            <button onClick={() => setModoGestion(true)}>
              ⚙️
            </button>

          </div>
        </div>

        {/* OVERLAY */}
        {menuAbierto && (
          <div
            className="fixed inset-0 bg-black bg-opacity-40 z-40"
            onClick={() => setMenuAbierto(false)}
          />
        )}

        {/* MENU LATERAL */}
        <div
          className={`fixed top-0 left-0 w-64 h-full bg-white z-50 transform ${
            menuAbierto ? "translate-x-0" : "-translate-x-full"
          } transition duration-300 ease-in-out overflow-y-auto pb-10 shadow-lg`}
        >
          <div className="p-4 font-bold border-b">Categorías</div>

          {categorias.map(c => (
            <button
              key={c}
              onClick={() => {
                setCategoriaActiva(c);
                setMenuAbierto(false);
              }}
              className={`block w-full text-left p-3 ${
                categoriaActiva === c
                  ? "bg-black text-white"
                  : "bg-gray-100"
              }`}
            >
              {c}
            </button>
          ))}
        </div>

        {/* TIPO PEDIDO */}
        <div className="flex gap-2 mb-3">

          <button
            onClick={() => setTipoPedido("comer")}
            className={`w-1/3 p-2 rounded ${
              tipoPedido === "comer"
                ? "bg-black text-white"
                : "bg-gray-200"
            }`}
          >
            🍽️ Comer
          </button>

          <button
            onClick={() => setTipoPedido("llevar")}
            className={`w-1/3 p-2 rounded ${
              tipoPedido === "llevar"
                ? "bg-black text-white"
                : "bg-gray-200"
            }`}
          >
            🥡 Llevar
          </button>

          <button
            onClick={() => setTipoPedido("recoger")}
            className={`w-1/3 p-2 rounded ${
              tipoPedido === "recoger"
                ? "bg-black text-white"
                : "bg-gray-200"
            }`}
          >
            🚶 Recoger
          </button>

        </div>

        {/* DATOS */}
        <div className="flex gap-2 mb-3">
          <input
            placeholder="Mesa"
            value={pedidoNumero}
            onChange={e => setPedidoNumero(e.target.value)}
            className="w-1/2 p-3 border rounded"
          />

          <input
            placeholder="Comensales"
            value={comensales}
            onChange={e => setComensales(e.target.value)}
            className="w-1/2 p-3 border rounded"
          />
        </div>

        {/* BUSCADOR */}
        <input
          value={busqueda}
          onChange={e => setBusqueda(e.target.value)}
          onKeyDown={(e) => {
            if (e.key === "Enter") {
              agregarArticulo(busqueda);
              setBusqueda("");
            }
          }}
          placeholder="Referencia..."
          className="w-full p-3 border rounded mb-4"
        />

        {/* CATEGORÍA */}
        {categoriaActiva && (
          <div className="flex justify-between items-center mb-2">

            <div className="font-bold">{categoriaActiva}</div>

            <button
              onClick={() => setListaAbierta(!listaAbierta)}
              className="text-sm bg-black text-white px-2 py-1 rounded"
            >
              {listaAbierta ? "⬆️ Ocultar" : "⬇️ Mostrar"}
            </button>

          </div>
        )}

        {/* LISTA */}
        {lista.length > 0 && listaAbierta && (
          <div className="bg-white rounded shadow mb-4">
            {lista.map(([ref, a]) => (
              <div
                key={ref}
                onClick={() => agregarArticulo(ref)}
                className="p-3 border-b grid grid-cols-[70px_1fr_auto] items-center"
              >
                <div className="font-bold">{ref}</div>
                <div className="truncate">{a.nombre}</div>
                <div className="text-right font-mono">{a.precio}€</div>
              </div>
            ))}
          </div>
        )}

        {/* TICKET */}
        {ticket.map((t, i) => {

          if (t.esHijoMenu) return null;

          const menu = MENUS?.[t.ref];

          return (
            <div key={i} className="border-b py-2">

              <div className="flex justify-between">

                <div className="flex flex-col flex-1">

                  <div className="text-xl font-bold">
                    {t.cantidad} x {t.ref}
                  </div>

                  <div className="text-[10px] text-gray-500">
                    {t.nombre}
                  </div>

                </div>

                <div className="font-bold">
                  {(t.precio * t.cantidad).toFixed(2)}€
                </div>

              </div>

            </div>
          );

        })}

        {/* TOTAL */}
        <div className="border-t mt-2 pt-2 flex justify-between font-bold">
          <span>Total</span>
          <span>{total.toFixed(2)}€</span>
        </div>

        {/* CERRAR TICKET */}
        <button
          onClick={() => {
            if (!pedidoActivoId) return;
            if (!confirm("¿Cerrar ticket?")) return;

            setPedidos(prev =>
              prev.filter(p => p.id !== pedidoActivoId)
            );

            setPedidoActivoId(null);
            setTicket([]);
            setPedidoNumero("");
          }}
          className="w-full bg-red-600 text-white p-3 rounded mb-2"
        >
          ✅ CERRAR TICKET
        </button>

        {/* COCINA / TICKET */}
        <div className="flex gap-2 mt-3">

          <button
            onClick={() => setModoCocina(true)}
            className="w-1/2 bg-orange-500 text-white p-2 rounded"
          >
            🍳 Cocina
          </button>

          <button
            onClick={() => {
              setNumeroTicket(generarNumeroTicket());
              setModoTicket(true);
            }}
            className="w-1/2 bg-black text-white p-2 rounded"
          >
            🧾 Ticket
          </button>

        </div>

        {/* POR PERSONA */}
        {porPersona && (
          <div className="text-sm text-gray-600 mt-2">
            Por persona: {porPersona}€
          </div>
        )}

        {/* DELIVERY */}
        {(tipoPedido === "llevar" || tipoPedido === "recoger") && (
          <div className="space-y-2 mb-4">

            <input
              placeholder="📍 Dirección"
              value={direccion}
              onChange={e => setDireccion(e.target.value)}
              className="w-full p-3 border rounded"
            />

            <input
              placeholder="📞 Teléfono"
              value={telefono}
              onChange={e => setTelefono(e.target.value)}
              className="w-full p-3 border rounded"
            />

            <select
              value={tiempo}
              onChange={e => setTiempo(e.target.value)}
              className="w-full p-3 border rounded"
            >
              <option>⏱ Tiempo estimado</option>
              <option>10 min</option>
              <option>20 min</option>
              <option>30 min</option>
              <option>1h</option>
            </select>

            <div className="flex gap-2">

              <button
                onClick={() => setMetodoPago("EFECTIVO")}
                className={`w-1/2 p-2 rounded ${
                  metodoPago === "EFECTIVO"
                    ? "bg-green-600 text-white"
                    : "bg-gray-200"
                }`}
              >
                💵 Efectivo
              </button>

              <button
                onClick={() => setMetodoPago("VISA")}
                className={`w-1/2 p-2 rounded ${
                  metodoPago === "VISA"
                    ? "bg-blue-600 text-white"
                    : "bg-gray-200"
                }`}
              >
                💳 Visa
              </button>

            </div>

          </div>
        )}

      </>
    )}

    {/* 🔵 PANTALLA PEDIDOS ABIERTOS */}
    {modoAbiertos && (
      <div className="bg-white p-2 rounded shadow mb-4">
        {/* (tu bloque igual que antes) */}
      </div>
    )}

  </div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(<POSApp />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("./sw.js")
      .then(reg => console.log("Service Worker registrado", reg))
      .catch(err => console.log("Error registrando SW", err));
  });
}
